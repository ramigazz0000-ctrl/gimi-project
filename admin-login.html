<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimi Admin - تسجيل الدخول</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="lang-ar bg-light login-body">

    <div class="login-container">
        <div class="login-card info-banner">
            <h1 class="logo text-center" style="margin-bottom: 30px;">Gimi Admin</h1>
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;">تسجيل الدخول للإدارة</h2>
            
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" required placeholder="أدخل اسم المستخدم (admin)">
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required placeholder="أدخل كلمة المرور (1234)">
                </div>
                
                <div id="login-error" class="error-msg" style="display: none; color: var(--primary); margin-bottom: 15px;">
                    اسم المستخدم أو كلمة المرور غير صحيحة.
                </div>
                
                <button type="submit" class="btn btn-primary w-100" style="margin-top: 10px;">دخول</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
